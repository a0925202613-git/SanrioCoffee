<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SanrioCoffee ☕🎀</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: linear-gradient(150deg, #fff0f7 0%, #fff8f0 55%, #f5f0ff 100%);
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Noto Sans TC', sans-serif;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(-3deg); }
        50%       { transform: translateY(-22px) rotate(4deg); }
      }
      @keyframes floatAlt {
        0%, 100% { transform: translateY(0px) rotate(5deg); }
        45%       { transform: translateY(-18px) rotate(-3deg); }
      }
      @keyframes floatSlow {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        40%       { transform: translateY(-14px) rotate(6deg); }
        80%       { transform: translateY(-6px) rotate(-4deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
